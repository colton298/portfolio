<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordle Solver</title>
    <header>
    <nav>
      <a href="index.html#about">About</a>
      <a href="projects.html">Projects</a>
      <a href="resume.html">Resume</a>
      <a href="contact.html">Contact</a>
    </nav>
    </header>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Wordle Solver</h1>

  <form id="solverForm" disabled>
    <label>Correct Positions (Green):</label>
    <div class="letter-row" id="greenRow">
      <input class="green" maxlength="1" />
      <input class="green" maxlength="1" />
      <input class="green" maxlength="1" />
      <input class="green" maxlength="1" />
      <input class="green" maxlength="1" />
    </div>

    <label>Wrong Positions (Yellow):</label>
    <div class="letter-row" id="yellowRow">
      <input class="yellow" maxlength="1" />
      <input class="yellow" maxlength="1" />
      <input class="yellow" maxlength="1" />
      <input class="yellow" maxlength="1" />
      <input class="yellow" maxlength="1" />
    </div>

    <label>Exclude Letters (Gray):</label>
    <input type="text" id="gray" placeholder="txyz" />

    <button type="submit">Find Words</button>
  </form>

  <h2>Possible Matches</h2>
  <ul id="results"></ul>
  <div id="loading" style="display: none;">
    <div class="loader"></div>
    <p>Finding matching words...</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
